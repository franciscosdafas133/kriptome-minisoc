<!--
  ===========================================================================
  Kriptome — agent.conf BASELINE (grupo 'kriptome-baseline')
  ===========================================================================
  Config compartida por todos los agentes. Se distribuye via grupos Wazuh.
  Aqui va el TUNING QUE PERTENECE AL AGENTE (no a reglas): que se monitorea,
  que ruido se ignora en origen, y opciones de FIM/Sysmon.
  ==
  REGLA: silenciar ruido de FIM a nivel de DIRECTORIO/REGEX se hace AQUI
  (soporta type="sregex"), NO en reglas. La whitelist de reglas (100030 +
  lista CDB) es solo para archivos exactos puntuales.
  ===========================================================================
-->
<agent_config>

  <!-- ===================== FIM / Syscheck ===================== -->
  <syscheck>
    <!-- Ignora PURO ruido operativo. NUNCA rutas sensibles. -->
    <ignore>/var/log/kriptome/heartbeat</ignore>
    <ignore type="sregex">\.swp$|\.tmp$|~$|/\.git/</ignore>

    <!-- Ejemplo de directorio critico monitoreado en tiempo real (Linux) -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc</directories>
    <directories check_all="yes" realtime="yes">/bin,/sbin,/usr/bin,/usr/sbin</directories>

    <!-- Ejemplo Windows (se aplica solo en agentes Windows) -->
    <directories check_all="yes" realtime="yes">%WINDIR%\System32\drivers\etc</directories>
  </syscheck>

  <!-- ===================== Notas de labels ====================
    Los labels de ASSET (asset_id, asset_alias, criticality) son POR AGENTE:
    van en el ossec.conf propio del agente (bloque <labels>), no aqui, porque
    cambian por endpoint. El label client_id SI puede ir en el agent.conf del
    grupo del cliente (ver CLI-001_agent.conf.example).
    Regla de seguridad (doc 03): ningun agente productivo queda en 'default';
    toda alerta debe traer client_id + asset_id.
  -->

</agent_config>
